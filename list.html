<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>旅行持ち物リスト</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        h1 {
            text-align: center;
            font-size: 24px;
            color: #11816b;
            margin-bottom: 20px;
            border-bottom: 2px solid #16a085;
            padding-bottom: 10px;
        }
        .table-wrapper {
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }
        th {
            background-color: #16a085;
            color: white;
            font-weight: bold;
        }
        tr:nth-child(even) {
            background-color: #fbfdfc;
        }
        
        /* チェックリストのスタイル */
        tbody tr {
            cursor: pointer;
            transition: background-color 0.2s ease;
        }
        tbody tr:hover {
            background-color: #e8f5f2;
        }
        .checkbox-cell {
            width: 40px;
            text-align: center;
        }
        input[type="checkbox"] {
            transform: scale(1.4);
            cursor: pointer;
            accent-color: #16a085;
        }
        tr.checked {
            background-color: #f0f0f0 !important;
            color: #999;
        }
        tr.checked .item-name {
            text-decoration: line-through;
        }

        /* -----------------------------------
           追加フォームのスタイル
           ----------------------------------- */
        .add-form {
            display: flex;
            margin-top: 20px;
            gap: 10px;
        }
        .add-form input[type="text"] {
            flex: 1;
            padding: 10px 15px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
            outline: none;
            transition: border-color 0.2s;
        }
        .add-form input[type="text"]:focus {
            border-color: #16a085;
        }
        .add-form button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #16a085;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s;
        }
        .add-form button:hover {
            background-color: #11816b;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>旅行持ち物リスト</h1>
    <div class="table-wrapper">
        <table id="checklistTable">
            <thead>
                <tr>
                    <th class="checkbox-cell">確認</th>
                    <th>持ち物</th>
                </tr>
            </thead>
            <tbody>
                <tr><td class="checkbox-cell"><input type="checkbox"></td><td class="item-name">マイナンバーカード</td></tr>
                <tr><td class="checkbox-cell"><input type="checkbox"></td><td class="item-name">お財布</td></tr>
                <tr><td class="checkbox-cell"><input type="checkbox"></td><td class="item-name">Suica</td></tr>
                <tr><td class="checkbox-cell"><input type="checkbox"></td><td class="item-name">スマホ</td></tr>
                <tr><td class="checkbox-cell"><input type="checkbox"></td><td class="item-name">着替え（シャツ、下着、靴下）</td></tr>
                <tr><td class="checkbox-cell"><input type="checkbox"></td><td class="item-name">充電器、ケーブル</td></tr>
                <tr><td class="checkbox-cell"><input type="checkbox"></td><td class="item-name">イヤホン</td></tr>
                <tr><td class="checkbox-cell"><input type="checkbox"></td><td class="item-name">インスタントコーヒー</td></tr>
            </tbody>
        </table>
    </div>

    <div class="add-form">
        <input type="text" id="newItemInput" placeholder="新しい持ち物を追加...">
        <button id="addButton">追加</button>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const tableBody = document.querySelector('#checklistTable tbody');
        const newItemInput = document.getElementById('newItemInput');
        const addButton = document.getElementById('addButton');

        // ローカルストレージに保存されている追加項目のリストを取得
        let customItems = JSON.parse(localStorage.getItem('trip_custom_items') || '[]');

        // 行にクリックイベントとチェック状態復元を設定する共通関数
        function setupRow(row, itemName) {
            const checkbox = row.querySelector('input[type="checkbox"]');
            const storageKey = 'trip_item_' + itemName;
            
            // チェック状態の復元
            if (localStorage.getItem(storageKey) === 'checked') {
                checkbox.checked = true;
                row.classList.add('checked');
            }

            // クリック時の動作
            row.addEventListener('click', function(e) {
                if (e.target.tagName !== 'INPUT') {
                    checkbox.checked = !checkbox.checked;
                }
                
                if (checkbox.checked) {
                    this.classList.add('checked');
                    localStorage.setItem(storageKey, 'checked');
                } else {
                    this.classList.remove('checked');
                    localStorage.removeItem(storageKey);
                }
            });
        }

        // 1. 初期HTMLに書かれている項目をセットアップ
        const initialRows = document.querySelectorAll('#checklistTable tbody tr');
        initialRows.forEach(row => {
            const itemName = row.querySelector('.item-name').textContent.trim();
            setupRow(row, itemName);
        });

        // 2. 過去に追加した「カスタム項目」を復元して表に追加
        customItems.forEach(item => {
            appendRow(item, false);
        });

        // 行をHTML（表）に追加する関数
        function appendRow(itemName, isNew) {
            const tr = document.createElement('tr');
            
            const tdCheck = document.createElement('td');
            tdCheck.className = 'checkbox-cell';
            tdCheck.innerHTML = '<input type="checkbox">';
            
            const tdName = document.createElement('td');
            tdName.className = 'item-name';
            tdName.textContent = itemName; // セキュリティ考慮（HTMLとして解釈させない）
            
            tr.appendChild(tdCheck);
            tr.appendChild(tdName);
            tableBody.appendChild(tr);
            
            setupRow(tr, itemName);

            // 新規追加時のみ、配列に追加してローカルストレージを更新
            if (isNew) {
                customItems.push(itemName);
                localStorage.setItem('trip_custom_items', JSON.stringify(customItems));
            }
        }

        // 新しいアイテムを追加する処理
        function handleAddItem() {
            const val = newItemInput.value.trim();
            if (!val) return; // 空白の場合は何もしない
            
            // すでに同じ名前の項目があるかチェック
            const currentNames = Array.from(document.querySelectorAll('.item-name')).map(el => el.textContent.trim());
            if (currentNames.includes(val)) {
                alert('そのアイテムはすでにリストに存在します。');
                return;
            }
            
            appendRow(val, true);
            newItemInput.value = ''; // 入力欄をクリア
        }

        // 「追加」ボタンがクリックされた時
        addButton.addEventListener('click', handleAddItem);

        // テキストボックスでEnterキーが押された時
        newItemInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                handleAddItem();
            }
        });
    });
</script>

</body>
</html>
